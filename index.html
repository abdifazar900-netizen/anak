<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Tangkas Dash - Fix Click</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-body: #a29bfe; --bg-card: #ffffff; --primary: #6c5ce7; }
        body { background-color: var(--bg-body); font-family: 'Segoe UI', sans-serif; padding: 10px; }
        #game-box { max-width: 500px; margin: auto; background: var(--bg-card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .track { height: 70px; background: #dfe6e9; border-radius: 10px; position: relative; margin: 15px 0; border-bottom: 4px solid #b2bec3; }
        #player { font-size: 40px; position: absolute; left: 0; transition: left 0.4s ease; z-index: 10; bottom: 5px; }
        .finish-line { position: absolute; right: 10px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px); }
        .question-box { background: #f8f9fa; padding: 15px; border-radius: 15px; min-height: 200px; border: 1px solid #eee; }
        .btn-ans { margin-bottom: 10px; font-weight: bold; border-radius: 12px; transition: 0.2s; padding: 12px; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(5px);} 75% {transform: translateX(-5px);} }
    </style>
</head>
<body>

<div id="game-box">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="fw-bold">Skor: <span id="current-score" class="text-primary">0</span></div>
        <div id="timer" class="fw-bold text-danger">⏱️ <span id="time-left">45</span>s</div>
    </div>

    <div class="track">
        <div id="player">🏃</div>
        <div class="finish-line"></div>
    </div>

    <div class="question-box text-center">
        <div id="start-screen">
            <h3 class="mb-3">Cerdas Tangkas Dash 🏁</h3>
            <p class="small text-muted mb-4">Ayo jawab semua soal untuk menang!</p>
            <input type="text" id="playerName" class="form-control mb-3 text-center" placeholder="Ketik Nama Kamu">
            <button type="button" class="btn btn-primary btn-lg w-100" onclick="mulaiPermainan()">MULAI BALAPAN</button>
        </div>

        <div id="quiz-area" style="display: none;">
            <div class="d-flex justify-content-between mb-2">
                <span class="badge bg-warning text-dark">Sisa Soal: <span id="queue-count">0</span></span>
            </div>
            <h5 id="question-text" class="mb-4 fw-bold">...</h5>
            <div id="options" class="d-grid gap-1"></div>
        </div>
    </div>
</div>

<script>
    // DATA PERTANYAAN
    const masterQuestions = [
        { q: "Apa warna daun yang sehat?", a: ["Hijau", "Merah", "Biru"], c: 0 },
        { q: "5 + 7 = ?", a: ["10", "12", "14"], c: 1 },
        { q: "Warna bendera Indonesia?", a: ["Merah Putih", "Putih Merah", "Biru"], c: 0 },
        { q: "Hewan yang bunyinya Kukuruyuk?", a: ["Kucing", "Ayam Jago", "Sapi"], c: 1 },
        { q: "Sebelum makan kita harus?", a: ["Tidur", "Cuci Tangan", "Lari"], c: 1 },
        { q: "Ibu kota Indonesia?", a: ["Jakarta", "Surabaya", "Medan"], c: 0 },
        { q: "Kita bernapas menghirup?", a: ["Air", "Udara", "Susu"], c: 1 }
    ];

    let score = 0;
    let timeLeft = 45;
    let gameActive = false;
    let playerPos = 0;
    let timerInterval;
    let currentAns = 0;
    let questionQueue = [];
    let currentIndexInQueue = -1;

    // FUNGSI SUARA (Dibuat lebih aman)
    function speak(text) {
        if ('speechSynthesis' in window) {
            try {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'id-ID';
                msg.pitch = 1.4;
                window.speechSynthesis.speak(msg);
            } catch (e) { console.log("Audio Error"); }
        }
    }

    // FUNGSI UTAMA START
    function mulaiPermainan() {
        const nameField = document.getElementById('playerName');
        const name = nameField.value.trim() || "Teman";

        // 1. Reset Data
        questionQueue = JSON.parse(JSON.stringify(masterQuestions)); // Copy murni
        score = 0;
        timeLeft = 45;
        playerPos = 0;
        gameActive = true;

        // 2. Update Tampilan
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('player').style.left = '0%';
        document.getElementById('current-score').innerText = score;
        document.getElementById('time-left').innerText = timeLeft;

        // 3. Jalankan Audio & Game
        speak("Halo " + name + "! Ayo mulai!");
        
        clearInterval(timerInterval);
        startTimer();
        nextQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) selesaikanGame("Waktu Habis! Skor kamu: " + score);
        }, 1000);
    }

    function nextQuestion() {
        if (questionQueue.length === 0) {
            selesaikanGame("HEBAT! Semua soal terjawab!");
            return;
        }

        document.getElementById('queue-count').innerText = questionQueue.length;
        currentIndexInQueue = Math.floor(Math.random() * questionQueue.length);
        const q = questionQueue[currentIndexInQueue];

        document.getElementById('question-text').innerText = q.q;
        currentAns = q.c;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary btn-ans';
            btn.innerText = opt;
            btn.onclick = function() { cekJawaban(i); };
            optionsDiv.appendChild(btn);
        });
    }

    function cekJawaban(idx) {
        if (!gameActive) return;

        if (idx === currentAns) {
            score += 10;
            playerPos += 15;
            document.getElementById('current-score').innerText = score;
            document.getElementById('player').style.left = Math.min(playerPos, 90) + '%';
            
            speak("Betul!");
            questionQueue.splice(currentIndexInQueue, 1);

            if (playerPos >= 90) {
                playerPos = 0;
                setTimeout(() => { document.getElementById('player').style.left = '0%'; }, 400);
            }
            setTimeout(nextQuestion, 400);
        } else {
            speak("Salah!");
            document.getElementById('game-box').style.animation = 'shake 0.2s';
            setTimeout(() => { 
                document.getElementById('game-box').style.animation = ''; 
                nextQuestion(); 
            }, 500);
        }
    }

    function selesaikanGame(msg) {
        gameActive = false;
        clearInterval(timerInterval);
        speak(msg);
        alert(msg);
        location.reload();
    }
</script>

</body>
</html>
