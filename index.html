<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Tangkas Dash - Perbaikan Sistem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-body: #a29bfe; --bg-card: #ffffff; --primary: #6c5ce7; }
        [data-theme="dark"] { --bg-body: #1a1a2e; --bg-card: #16213e; --primary: #0f3460; }
        body { background-color: var(--bg-body); font-family: 'Segoe UI', sans-serif; transition: 0.3s; padding: 10px; }
        #game-box { max-width: 600px; margin: auto; background: var(--bg-card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .track { height: 80px; background: #dfe6e9; border-radius: 10px; position: relative; margin: 20px 0; border-bottom: 4px solid #b2bec3; overflow: hidden; }
        #player { font-size: 45px; position: absolute; left: 0; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .finish-line { position: absolute; right: 10px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px); }
        .question-box { background: rgba(0,0,0,0.05); padding: 20px; border-radius: 15px; min-height: 200px; }
        .btn-ans { margin: 5px; font-weight: bold; border-radius: 12px; border: 2px solid var(--primary); transition: 0.2s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(8px);} 75% {transform: translateX(-8px);} }
    </style>
</head>
<body>

<div id="game-box">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>Skor: <span id="current-score" class="fw-bold fs-4">0</span></div>
        <div id="timer" class="fw-bold text-danger fs-4">⏱️ <span id="time-left">45</span>s</div>
    </div>

    <div class="track">
        <div id="player">🏃</div>
        <div class="finish-line"></div>
    </div>

    <div class="question-box text-center">
        <div id="start-screen">
            <h3 class="mb-3">Cerdas Tangkas Dash 🏁</h3>
            <p class="small text-muted">Pastikan Volume HP Nyala ya!</p>
            <input type="text" id="playerName" class="form-control mb-3 text-center" placeholder="Nama Anak">
            <button class="btn btn-primary btn-lg w-100 mb-2" onclick="initAndStart()">MULAI BALAPAN</button>
        </div>

        <div id="quiz-area" style="display: none;">
            <div class="d-flex justify-content-between mb-2">
                <span id="level-display" class="badge bg-warning">Level 1</span>
                <span class="small fw-bold">Sisa Soal: <span id="queue-count">0</span></span>
            </div>
            <h5 id="question-text" class="mb-4">Memuat pertanyaan...</h5>
            <div id="options" class="d-grid gap-2"></div>
        </div>
    </div>
</div>

<script>
    const questions = [
        // Pengetahuan Alam & Umum
        { q: "Apa warna daun yang sehat?", a: ["Hijau", "Ungu", "Biru"], c: 0 },
        { q: "Hewan yang bunyinya 'Meong'?", a: ["Anjing", "Ayam", "Kucing"], c: 2 },
        { q: "Planet tempat kita tinggal bernama?", a: ["Mars", "Bumi", "Venus"], c: 1 },
        { q: "Benda langit yang muncul di siang hari?", a: ["Bulan", "Bintang", "Matahari"], c: 2 },
        { q: "Hewan yang memiliki belalai panjang?", a: ["Jerapah", "Gajah", "Harimau"], c: 1 },
        { q: "Alat untuk melihat waktu disebut?", a: ["Jam", "Kaca", "Kompas"], c: 0 },
        
        // Matematika Dasar
        { q: "5 + 7 = ?", a: ["10", "12", "15"], c: 1 },
        { q: "Berapakah 10 - 4?", a: ["6", "5", "7"], c: 0 },
        { q: "Jika punya 3 apel lalu beli lagi 3, jadi berapa?", a: ["5", "6", "9"], c: 1 },
        { q: "Berapakah 2 x 4?", a: ["6", "8", "10"], c: 1 },
        { q: "Angka setelah 19 adalah?", a: ["18", "20", "21"], c: 1 },
        
        // Kebiasaan Sehat & Adab
        { q: "Manakah makanan yang sehat?", a: ["Permen", "Buah", "Soda"], c: 1 },
        { q: "Sebelum makan kita harus?", a: ["Tidur", "Lari", "Cuci Tangan"], c: 2 },
        { q: "Gigi harus dibersihkan menggunakan?", a: ["Sabun", "Sikat Gigi", "Sisir"], c: 1 },
        { q: "Sampah harus dibuang di?", a: ["Sungai", "Jalan", "Tempat Sampah"], c: 2 },
        { q: "Berapa kali kita harus mandi dalam sehari?", a: ["1 Kali", "2 Kali", "5 Kali"], c: 1 },
        
        // Kewarganegaraan & Geografi
        { q: "Ibu kota negara Indonesia adalah?", a: ["Jakarta", "Bandung", "Surabaya"], c: 0 },
        { q: "Warna bendera Indonesia adalah?", a: ["Putih Merah", "Merah Putih", "Biru Putih"], c: 1 },
        { q: "Lambang negara Indonesia adalah burung?", a: ["Elang", "Garuda", "Merpati"], c: 1 },
        { q: "Presiden pertama Indonesia adalah?", a: ["Soeharto", "Soekarno", "Jokowi"], c: 1 },

        // Tebak Kata & Logika
        { q: "Aku bulat, bisa ditendang, permainan apa aku?", a: ["Basket", "Bola", "Kasti"], c: 1 },
        { q: "Kendaraan yang berjalan di atas rel?", a: ["Bus", "Kapal", "Kereta Api"], c: 2 },
        { q: "Rasa gula adalah?", a: ["Asin", "Pahit", "Manis"], c: 2 },
        { q: "Awan di langit warnanya?", a: ["Putih", "Hijau", "Merah"], c: 0 }
    ];

    let score = 0;
    let timeLeft = 45;
    let gameActive = false;
    let playerPos = 0;
    let timerInterval;
    let currentAns = 0;
    let questionQueue = [];
    let currentIndexInQueue = -1;

    // Fungsi Suara yang lebih kompatibel
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.pitch = 1.5;
            window.speechSynthesis.speak(msg);
        }
    }

    // Inisialisasi suara (PENTING untuk browser)
    function initAndStart() {
        // Suara harus dipicu pertama kali oleh klik tombol user
        speak(""); 
        startGame();
    }

    function startGame() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value || "Teman";
        
        questionQueue = [...masterQuestions];
        score = 0;
        timeLeft = 45;
        playerPos = 0;
        gameActive = true;

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('player').style.left = '0%';
        document.getElementById('current-score').innerText = score;

        speak("Halo " + name + "! Ayo kita balapan. Fokus ya!");
        nextQuestion();
        startTimer();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) endGame("Yah, waktu habis! Skor kamu: " + score);
        }, 1000);
    }

    function nextQuestion() {
        if (questionQueue.length === 0) {
            endGame("HEBAT! Kamu berhasil menjawab semua soal!");
            return;
        }

        document.getElementById('queue-count').innerText = questionQueue.length;
        currentIndexInQueue = Math.floor(Math.random() * questionQueue.length);
        const q = questionQueue[currentIndexInQueue];

        document.getElementById('question-text').innerText = q.q;
        currentAns = q.c;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-ans btn-outline-primary';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        if (!gameActive) return;

        if (idx === currentAns) {
            score += 10;
            playerPos += 15;
            document.getElementById('current-score').innerText = score;
            document.getElementById('player').style.left = Math.min(playerPos, 90) + '%';
            
            speak("Betul!");
            questionQueue.splice(currentIndexInQueue, 1);

            if (playerPos >= 90) {
                timeLeft += 5;
                playerPos = 0;
                setTimeout(() => { document.getElementById('player').style.left = '0%'; }, 400);
                speak("Finish! Lanjut lagi!");
            }
            setTimeout(nextQuestion, 500);
        } else {
            speak("Salah, coba lagi!");
            document.getElementById('game-box').style.animation = 'shake 0.2s linear';
            setTimeout(() => { document.getElementById('game-box').style.animation = ''; }, 200);
            setTimeout(nextQuestion, 800);
        }
    }

    function endGame(msg) {
        gameActive = false;
        clearInterval(timerInterval);
        speak(msg);
        alert(msg);
        location.reload();
    }
</script>
</body>
</html>
