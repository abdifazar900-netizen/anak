<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Tangkas Dash - Level Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #a29bfe;
            --bg-card: #ffffff;
            --text-main: #212121;
            --primary: #6c5ce7;
        }

        [data-theme="dark"] {
            --bg-body: #1a1a2e;
            --bg-card: #16213e;
            --text-main: #e94560;
            --primary: #0f3460;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Segoe UI', sans-serif; 
            transition: 0.3s;
            color: var(--text-main);
        }

        #game-box { 
            max-width: 600px; margin: 20px auto; background: var(--bg-card); 
            border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .track { 
            height: 80px; background: #dfe6e9; border-radius: 10px; 
            position: relative; margin: 20px 0; border-bottom: 4px solid #b2bec3; 
        }

        #player { 
            font-size: 45px; position: absolute; left: 0; 
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .finish-line { 
            position: absolute; right: 10px; top: 0; bottom: 0; 
            width: 10px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px); 
        }

        .question-box { 
            background: rgba(0,0,0,0.05); padding: 20px; 
            border-radius: 15px; min-height: 200px; 
        }

        .btn-ans { 
            margin: 5px; font-weight: bold; border-radius: 12px; 
            border: 2px solid var(--primary); color: var(--text-main);
            transition: 0.2s;
        }

        .btn-ans:hover { background: var(--primary); color: white; }

        .btn-theme {
            position: fixed; bottom: 20px; right: 20px; 
            width: 50px; height: 50px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(8px);} 75% {transform: translateX(-8px);} }
    </style>
</head>
<body>

<button class="btn btn-dark btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div id="game-box">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>Skor: <span id="current-score" class="fw-bold fs-4">0</span></div>
        <div id="timer" class="fw-bold text-danger fs-4">⏱️ <span id="time-left">30</span>s</div>
        <div class="small fw-bold">Soal Sisa: <span id="queue-count">0</span></div>
    </div>

    <div class="track">
        <div id="player">🏃</div>
        <div class="finish-line"></div>
    </div>

    <div class="question-box text-center">
        <div id="start-screen">
            <h3 class="mb-3">Cerdas Tangkas Dash 🏁</h3>
            <p>Jawab benar untuk lari sampai finish!<br>Pertanyaan benar tidak akan diulang.</p>
            <input type="text" id="playerName" class="form-control mb-3 text-center" placeholder="Nama Kamu">
            <button class="btn btn-primary btn-lg w-100" onclick="startGame()">MULAI BALAPAN</button>
        </div>

        <div id="quiz-area" style="display: none;">
            <h4 id="level-display" class="badge bg-warning mb-2">Level 1</h4>
            <h5 id="question-text" class="mb-4">Memuat pertanyaan...</h5>
            <div id="options" class="d-grid gap-2"></div>
        </div>
    </div>
</div>

<script>
    // BANK DATA PERTANYAAN (Master)
    c    const questions = [
        // Pengetahuan Alam & Umum
        { q: "Apa warna daun yang sehat?", a: ["Hijau", "Ungu", "Biru"], c: 0 },
        { q: "Hewan yang bunyinya 'Meong'?", a: ["Anjing", "Ayam", "Kucing"], c: 2 },
        { q: "Planet tempat kita tinggal bernama?", a: ["Mars", "Bumi", "Venus"], c: 1 },
        { q: "Benda langit yang muncul di siang hari?", a: ["Bulan", "Bintang", "Matahari"], c: 2 },
        { q: "Hewan yang memiliki belalai panjang?", a: ["Jerapah", "Gajah", "Harimau"], c: 1 },
        { q: "Alat untuk melihat waktu disebut?", a: ["Jam", "Kaca", "Kompas"], c: 0 },
        
        // Matematika Dasar
        { q: "5 + 7 = ?", a: ["10", "12", "15"], c: 1 },
        { q: "Berapakah 10 - 4?", a: ["6", "5", "7"], c: 0 },
        { q: "Jika punya 3 apel lalu beli lagi 3, jadi berapa?", a: ["5", "6", "9"], c: 1 },
        { q: "Berapakah 2 x 4?", a: ["6", "8", "10"], c: 1 },
        { q: "Angka setelah 19 adalah?", a: ["18", "20", "21"], c: 1 },
        
        // Kebiasaan Sehat & Adab
        { q: "Manakah makanan yang sehat?", a: ["Permen", "Buah", "Soda"], c: 1 },
        { q: "Sebelum makan kita harus?", a: ["Tidur", "Lari", "Cuci Tangan"], c: 2 },
        { q: "Gigi harus dibersihkan menggunakan?", a: ["Sabun", "Sikat Gigi", "Sisir"], c: 1 },
        { q: "Sampah harus dibuang di?", a: ["Sungai", "Jalan", "Tempat Sampah"], c: 2 },
        { q: "Berapa kali kita harus mandi dalam sehari?", a: ["1 Kali", "2 Kali", "5 Kali"], c: 1 },
        
        // Kewarganegaraan & Geografi
        { q: "Ibu kota negara Indonesia adalah?", a: ["Jakarta", "Bandung", "Surabaya"], c: 0 },
        { q: "Warna bendera Indonesia adalah?", a: ["Putih Merah", "Merah Putih", "Biru Putih"], c: 1 },
        { q: "Lambang negara Indonesia adalah burung?", a: ["Elang", "Garuda", "Merpati"], c: 1 },
        { q: "Presiden pertama Indonesia adalah?", a: ["Soeharto", "Soekarno", "Jokowi"], c: 1 },

        // Tebak Kata & Logika
        { q: "Aku bulat, bisa ditendang, permainan apa aku?", a: ["Basket", "Bola", "Kasti"], c: 1 },
        { q: "Kendaraan yang berjalan di atas rel?", a: ["Bus", "Kapal", "Kereta Api"], c: 2 },
        { q: "Rasa gula adalah?", a: ["Asin", "Pahit", "Manis"], c: 2 },
        { q: "Awan di langit warnanya?", a: ["Putih", "Hijau", "Merah"], c: 0 }
    ];

    let score = 0;
    let timeLeft = 45; // Waktu lebih lama untuk banyak soal
    let gameActive = false;
    let playerPos = 0;
    let timerInterval;
    let currentAns = 0;
    let questionQueue = [];
    let currentIndexInQueue = -1;

    // Suara Robot Ceria
    function speak(text) {
        window.speechSynthesis.cancel(); // Hentikan suara sebelumnya
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'id-ID';
        msg.pitch = 1.6; // Suara tinggi seperti anak
        msg.rate = 1;
        window.speechSynthesis.speak(msg);
    }

    function toggleTheme() {
        const body = document.documentElement;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            document.getElementById('themeBtn').innerText = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '☀️';
        }
    }

    function startGame() {
        const name = document.getElementById('playerName').value;
        if (!name) { alert("Tulis namamu dulu ya!"); return; }

        questionQueue = [...masterQuestions]; // Salin semua soal ke antrean
        score = 0;
        timeLeft = 45;
        playerPos = 0;
        gameActive = true;

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('player').style.left = '0%';

        speak("Halo " + name + "! Ayo kita balapan sambil belajar. Semangat!");
        nextQuestion();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) endGame("Yah, waktu habis! Skor kamu: " + score);
        }, 1000);
    }

    function nextQuestion() {
        if (questionQueue.length === 0) {
            endGame("HEBAT! Semua pertanyaan sudah kamu jawab dengan benar!");
            return;
        }

        document.getElementById('queue-count').innerText = questionQueue.length;
        
        // Ambil soal secara acak dari antrean
        currentIndexInQueue = Math.floor(Math.random() * questionQueue.length);
        const q = questionQueue[currentIndexInQueue];

        document.getElementById('question-text').innerText = q.q;
        document.getElementById('level-display').innerText = "Level " + (q.lvl || 1);
        currentAns = q.c;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-ans';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        if (!gameActive) return;

        if (idx === currentAns) {
            score += 10;
            playerPos += 15;
            document.getElementById('current-score').innerText = score;
            document.getElementById('player').style.left = Math.min(playerPos, 90) + '%';
            
            speak("Bagus! Benar sekali.");

            // HAPUS soal ini dari antrean karena sudah dijawab benar
            questionQueue.splice(currentIndexInQueue, 1);

            if (playerPos >= 90) {
                timeLeft += 3; // Bonus waktu
                playerPos = 0;
                setTimeout(() => { document.getElementById('player').style.left = '0%'; }, 500);
                speak("Kamu sampai finish! Ayo putaran berikutnya.");
            }
            
            setTimeout(nextQuestion, 600);
        } else {
            speak("Kurang tepat. Coba lagi ya.");
            document.getElementById('game-box').style.animation = 'shake 0.2s';
            setTimeout(() => { document.getElementById('game-box').style.animation = ''; }, 200);
            
            // Soal TIDAK dihapus, tapi kita pindah ke soal lain biar tidak bosan
            setTimeout(nextQuestion, 1000);
        }
    }

    function endGame(msg) {
        gameActive = false;
        clearInterval(timerInterval);
        speak(msg);
        alert(msg);
        location.reload();
    }
</script>

</body>
</html>
