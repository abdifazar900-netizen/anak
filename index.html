<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Tangkas Dash - Super Stable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #6c5ce7; font-family: 'Segoe UI', sans-serif; padding: 15px; min-height: 100vh; }
        .main-container { max-width: 900px; margin: auto; }
        #game-box { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #leaderboard-box { background: #ffffff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); height: 100%; }
        .track { height: 70px; background: #dfe6e9; border-radius: 12px; position: relative; margin: 15px 0; border-bottom: 5px solid #b2bec3; }
        #player { font-size: 40px; position: absolute; left: 0; transition: left 0.4s ease; bottom: 5px; transform: scaleX(-1); }
        .finish-line { position: absolute; right: 10px; top: 0; bottom: 0; width: 12px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px); }
        .question-box { background: #f8f9fa; padding: 15px; border-radius: 15px; min-height: 180px; border: 1px solid #ddd; }
        .btn-ans { margin-bottom: 8px; font-weight: bold; border-radius: 10px; padding: 12px; width: 100%; border: 2px solid #6c5ce7; background: white; color: #6c5ce7; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-weight: bold; }
        .rank-1 { color: #f1c40f; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="row g-4">
        <div class="col-lg-8">
            <div id="game-box">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="fw-bold fs-5">Skor: <span id="current-score" class="text-primary">0</span></div>
                    <div class="fw-bold text-danger fs-5">⏱️ <span id="time-left">45</span>s</div>
                </div>
                <div class="track"><div id="player">🏃</div><div class="finish-line"></div></div>
                <div class="question-box text-center">
                    <div id="start-screen">
                        <h3 class="mb-3">Cerdas Tangkas Dash 🏁</h3>
                        <input type="text" id="playerName" class="form-control mb-3 text-center" placeholder="Nama Kamu">
                        <button type="button" class="btn btn-primary btn-lg w-100 shadow" onclick="gameControl.start()">MULAI BALAPAN</button>
                    </div>
                    <div id="quiz-area" style="display: none;">
                        <div class="small fw-bold mb-2 text-muted">Sisa: <span id="queue-count">0</span></div>
                        <h5 id="question-text" class="mb-4 fw-bold">...</h5>
                        <div id="options"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div id="leaderboard-box">
                <h4 class="text-center mb-3">🏆 TOP 5</h4>
                <div id="rank-list"></div>
                <button class="btn btn-link btn-sm w-100 text-muted mt-2" onclick="gameControl.resetScores()">Reset Skor</button>
            </div>
        </div>
    </div>
</div>

<audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
// MASTER DATA
const Q_BANK = [
     // Pengetahuan Alam & Umum
        { q: "Apa warna daun yang sehat?", a: ["Hijau", "Ungu", "Biru"], c: 0 },
        { q: "Hewan yang bunyinya 'Meong'?", a: ["Anjing", "Ayam", "Kucing"], c: 2 },
        { q: "Planet tempat kita tinggal bernama?", a: ["Mars", "Bumi", "Venus"], c: 1 },
        { q: "Benda langit yang muncul di siang hari?", a: ["Bulan", "Bintang", "Matahari"], c: 2 },
        { q: "Hewan yang memiliki belalai panjang?", a: ["Jerapah", "Gajah", "Harimau"], c: 1 },
        { q: "Alat untuk melihat waktu disebut?", a: ["Jam", "Kaca", "Kompas"], c: 0 },
        
        // Matematika Dasar
        { q: "5 + 7 = ?", a: ["10", "12", "15"], c: 1 },
        { q: "Berapakah 10 - 4?", a: ["6", "5", "7"], c: 0 },
        { q: "Jika punya 3 apel lalu beli lagi 3, jadi berapa?", a: ["5", "6", "9"], c: 1 },
        { q: "Berapakah 2 x 4?", a: ["6", "8", "10"], c: 1 },
        { q: "Angka setelah 19 adalah?", a: ["18", "20", "21"], c: 1 },
        
        // Kebiasaan Sehat & Adab
        { q: "Manakah makanan yang sehat?", a: ["Permen", "Buah", "Soda"], c: 1 },
        { q: "Sebelum makan kita harus?", a: ["Tidur", "Lari", "Cuci Tangan"], c: 2 },
        { q: "Gigi harus dibersihkan menggunakan?", a: ["Sabun", "Sikat Gigi", "Sisir"], c: 1 },
        { q: "Sampah harus dibuang di?", a: ["Sungai", "Jalan", "Tempat Sampah"], c: 2 },
        { q: "Berapa kali kita harus mandi dalam sehari?", a: ["1 Kali", "2 Kali", "5 Kali"], c: 1 },
        
        // Kewarganegaraan & Geografi
        { q: "Ibu kota negara Indonesia adalah?", a: ["Jakarta", "Bandung", "Surabaya"], c: 0 },
        { q: "Warna bendera Indonesia adalah?", a: ["Putih Merah", "Merah Putih", "Biru Putih"], c: 1 },
        { q: "Lambang negara Indonesia adalah burung?", a: ["Elang", "Garuda", "Merpati"], c: 1 },
        { q: "Presiden pertama Indonesia adalah?", a: ["Soeharto", "Soekarno", "Jokowi"], c: 1 },

        // Tebak Kata & Logika
        { q: "Aku bulat, bisa ditendang, permainan apa aku?", a: ["Basket", "Bola", "Kasti"], c: 1 },
        { q: "Kendaraan yang berjalan di atas rel?", a: ["Bus", "Kapal", "Kereta Api"], c: 2 },
        { q: "Rasa gula adalah?", a: ["Asin", "Pahit", "Manis"], c: 2 },
        { q: "Awan di langit warnanya?", a: ["Putih", "Hijau", "Merah"], c: 0 }
    ];

// GAME ENGINE
const gameControl = {
    score: 0, timeLeft: 45, active: false, pos: 0, queue: [], timer: null, currentIdx: -1, name: "",

    init() { this.updateLeaderboard(); },

    start() {
        this.name = document.getElementById('playerName').value.trim() || "Anak Cerdas";
        this.queue = JSON.parse(JSON.stringify(Q_BANK));
        this.score = 0; this.timeLeft = 45; this.pos = 0; this.active = true;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('player').style.left = '0%';
        
        try { 
            const m = document.getElementById('bg-music');
            m.volume = 0.2; m.play();
        } catch(e) {}

        this.startTimer();
        this.showQuestion();
    },

    startTimer() {
        if(this.timer) clearInterval(this.timer);
        this.timer = setInterval(() => {
            if(!this.active) return;
            this.timeLeft--;
            document.getElementById('time-left').innerText = this.timeLeft;
            if(this.timeLeft <= 0) this.end("Waktu habis!");
        }, 1000);
    },

    showQuestion() {
        if(this.queue.length === 0) return this.end("Semua soal selesai!");
        document.getElementById('queue-count').innerText = this.queue.length;
        this.currentIdx = Math.floor(Math.random() * this.queue.length);
        const q = this.queue[this.currentIdx];
        document.getElementById('question-text').innerText = q.q;
        
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        q.a.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'btn btn-ans';
            b.innerText = o;
            b.onclick = () => this.check(i);
            optDiv.appendChild(b);
        });
    },

    check(idx) {
        if(!this.active) return;
        const correct = this.queue[this.currentIdx].c;
        if(idx === correct) {
            this.score += 10; this.pos += 15;
            document.getElementById('current-score').innerText = this.score;
            document.getElementById('player').style.left = Math.min(this.pos, 90) + '%';
            this.queue.splice(this.currentIdx, 1);
            if(this.pos >= 90) { 
                this.pos = 0; 
                setTimeout(() => document.getElementById('player').style.left = '0%', 400); 
            }
            setTimeout(() => this.showQuestion(), 400);
        } else {
            setTimeout(() => this.showQuestion(), 600);
        }
    },

    end(msg) {
        this.active = false;
        clearInterval(this.timer);
        document.getElementById('bg-music').pause();
        this.saveScore();
        alert(msg + "\nSkor: " + this.score);
        location.reload();
    },

    saveScore() {
        let h = JSON.parse(localStorage.getItem('topScores')) || [];
        h.push({ n: this.name, s: this.score });
        h.sort((a,b) => b.s - a.s);
        localStorage.setItem('topScores', JSON.stringify(h.slice(0,5)));
    },

    updateLeaderboard() {
        const h = JSON.parse(localStorage.getItem('topScores')) || [];
        const l = document.getElementById('rank-list');
        l.innerHTML = h.map((d, i) => `
            <div class="rank-item ${i===0?'rank-1':''}">
                <span>${i+1}. ${d.n}</span><span>${d.s}</span>
            </div>`).join('') || '<p class="text-muted text-center">Belum ada skor</p>';
    },

    resetScores() {
        if(confirm("Hapus semua skor?")) { localStorage.removeItem('topScores'); this.updateLeaderboard(); }
    }
};

// JALANKAN SAAT HALAMAN SIAP
window.onload = () => gameControl.init();
</script>
</body>
</html>
