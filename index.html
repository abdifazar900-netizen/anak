<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Tangkas - Anak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-body: #6c5ce7; --bg-card: #ffffff; --primary: #6c5ce7; }
        body { background-color: var(--bg-body); font-family: 'Segoe UI', sans-serif; padding: 10px; }
        #game-box { max-width: 500px; margin: auto; background: var(--bg-card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .track { height: 75px; background: #dfe6e9; border-radius: 12px; position: relative; margin: 15px 0; border-bottom: 5px solid #b2bec3; }
        #player { font-size: 45px; position: absolute; left: 0; transition: left 0.4s ease; z-index: 10; bottom: 5px; }
        .finish-line { position: absolute; right: 10px; top: 0; bottom: 0; width: 12px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px); }
        .question-box { background: #f1f2f6; padding: 15px; border-radius: 15px; min-height: 180px; border: 2px solid #eee; }
        .btn-ans { margin-bottom: 8px; font-weight: bold; border-radius: 12px; transition: 0.2s; padding: 10px; border: 2px solid var(--primary); }
        .music-control { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 24px; z-index: 100; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(5px);} 75% {transform: translateX(-5px);} }
    </style>
</head>
<body>

<div id="game-box" class="position-relative">
    <div id="music-toggle" class="music-control" onclick="toggleMusic()">🔊</div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="fw-bold">Skor: <span id="current-score" class="text-primary">0</span></div>
        <div id="timer" class="fw-bold text-danger">⏱️ <span id="time-left">45</span>s</div>
    </div>

    <div class="track">
        <div id="player">🏃</div>
        <div class="finish-line"></div>
    </div>

    <div class="question-box text-center">
        <div id="start-screen">
            <h3 class="mb-3">Cerdas Tangkas Anak 🏁</h3>
            <p class="small text-muted mb-4">Ayo Balapan Sambil Belajar!(Perlu dampingi Orang tua ya)</p>
            <input type="text" id="playerName" class="form-control mb-3 text-center shadow-sm" placeholder="Ketik Nama Anak">
            <button type="button" class="btn btn-primary btn-lg w-100 shadow" onclick="mulaiPermainan()">MULAI BALAPAN</button>
        </div>

        <div id="quiz-area" style="display: none;">
            <div class="d-flex justify-content-between mb-2">
                <span class="badge bg-warning text-dark">Sisa Soal: <span id="queue-count">0</span></span>
            </div>
            <h5 id="question-text" class="mb-4 fw-bold">...</h5>
            <div id="options" class="d-grid gap-1"></div>
        </div>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
</audio>

<script>
    const questions = [
        // Pengetahuan Alam & Umum
        { q: "Apa warna daun yang sehat?", a: ["Hijau", "Ungu", "Biru"], c: 0 },
        { q: "Hewan yang bunyinya 'Meong'?", a: ["Anjing", "Ayam", "Kucing"], c: 2 },
        { q: "Planet tempat kita tinggal bernama?", a: ["Mars", "Bumi", "Venus"], c: 1 },
        { q: "Benda langit yang muncul di siang hari?", a: ["Bulan", "Bintang", "Matahari"], c: 2 },
        { q: "Hewan yang memiliki belalai panjang?", a: ["Jerapah", "Gajah", "Harimau"], c: 1 },
        { q: "Alat untuk melihat waktu disebut?", a: ["Jam", "Kaca", "Kompas"], c: 0 },
        
        // Matematika Dasar
        { q: "5 + 7 = ?", a: ["10", "12", "15"], c: 1 },
        { q: "Berapakah 10 - 4?", a: ["6", "5", "7"], c: 0 },
        { q: "Jika punya 3 apel lalu beli lagi 3, jadi berapa?", a: ["5", "6", "9"], c: 1 },
        { q: "Berapakah 2 x 4?", a: ["6", "8", "10"], c: 1 },
        { q: "Angka setelah 19 adalah?", a: ["18", "20", "21"], c: 1 },
        
        // Kebiasaan Sehat & Adab
        { q: "Manakah makanan yang sehat?", a: ["Permen", "Buah", "Soda"], c: 1 },
        { q: "Sebelum makan kita harus?", a: ["Tidur", "Lari", "Cuci Tangan"], c: 2 },
        { q: "Gigi harus dibersihkan menggunakan?", a: ["Sabun", "Sikat Gigi", "Sisir"], c: 1 },
        { q: "Sampah harus dibuang di?", a: ["Sungai", "Jalan", "Tempat Sampah"], c: 2 },
        { q: "Berapa kali kita harus mandi dalam sehari?", a: ["1 Kali", "2 Kali", "5 Kali"], c: 1 },
        
        // Kewarganegaraan & Geografi
        { q: "Ibu kota negara Indonesia adalah?", a: ["Jakarta", "Bandung", "Surabaya"], c: 0 },
        { q: "Warna bendera Indonesia adalah?", a: ["Putih Merah", "Merah Putih", "Biru Putih"], c: 1 },
        { q: "Lambang negara Indonesia adalah burung?", a: ["Elang", "Garuda", "Merpati"], c: 1 },
        { q: "Presiden pertama Indonesia adalah?", a: ["Soeharto", "Soekarno", "Jokowi"], c: 1 },

        // Tebak Kata & Logika
        { q: "Aku bulat, bisa ditendang, permainan apa aku?", a: ["Basket", "Bola", "Kasti"], c: 1 },
        { q: "Kendaraan yang berjalan di atas rel?", a: ["Bus", "Kapal", "Kereta Api"], c: 2 },
        { q: "Rasa gula adalah?", a: ["Asin", "Pahit", "Manis"], c: 2 },
        { q: "Awan di langit warnanya?", a: ["Putih", "Hijau", "Merah"], c: 0 }
    ];

    let score = 0, timeLeft = 45, gameActive = false, playerPos = 0, timerInterval, currentAns = 0, questionQueue = [], currentIndexInQueue = -1;
    const bgMusic = document.getElementById('bg-music');

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.pitch = 1.4;
            window.speechSynthesis.speak(msg);
        }
    }

    function toggleMusic() {
        if (bgMusic.paused) {
            bgMusic.play();
            document.getElementById('music-toggle').innerText = "🔊";
        } else {
            bgMusic.pause();
            document.getElementById('music-toggle').innerText = "🔈";
        }
    }

    function mulaiPermainan() {
        const name = document.getElementById('playerName').value.trim() || "Anak Cerdas";
        questionQueue = JSON.parse(JSON.stringify(masterQuestions));
        score = 0; timeLeft = 45; playerPos = 0; gameActive = true;

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('current-score').innerText = score;

        // Jalankan Musik & Suara
        bgMusic.volume = 0.3; // Volume musik pelan agar suara robot terdengar
        bgMusic.play().catch(e => console.log("Music blocked by browser"));
        speak("Halo " + name + "! Mari balapan!");

        startTimer();
        nextQuestion();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) selesaikanGame("Waktu Habis! Skor kamu: " + score);
        }, 1000);
    }

    function nextQuestion() {
        if (questionQueue.length === 0) return selesaikanGame("HEBAT! Semua soal terjawab!");
        document.getElementById('queue-count').innerText = questionQueue.length;
        currentIndexInQueue = Math.floor(Math.random() * questionQueue.length);
        const q = questionQueue[currentIndexInQueue];
        document.getElementById('question-text').innerText = q.q;
        currentAns = q.c;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary btn-ans';
            btn.innerText = opt;
            btn.onclick = function() { cekJawaban(i); };
            optionsDiv.appendChild(btn);
        });
    }

    function cekJawaban(idx) {
        if (!gameActive) return;
        if (idx === currentAns) {
            score += 10; playerPos += 15;
            document.getElementById('current-score').innerText = score;
            document.getElementById('player').style.left = Math.min(playerPos, 90) + '%';
            speak("Betul!");
            questionQueue.splice(currentIndexInQueue, 1);
            if (playerPos >= 90) {
                playerPos = 0;
                setTimeout(() => { document.getElementById('player').style.left = '0%'; }, 400);
            }
            setTimeout(nextQuestion, 400);
        } else {
            speak("Salah!");
            document.getElementById('game-box').style.animation = 'shake 0.2s';
            setTimeout(() => { document.getElementById('game-box').style.animation = ''; nextQuestion(); }, 500);
        }
    }

    function selesaikanGame(msg) {
        gameActive = false;
        clearInterval(timerInterval);
        bgMusic.pause();
        bgMusic.currentTime = 0;
        speak(msg);
        alert(msg);
        location.reload();
    }
</script>
</body>
</html>
